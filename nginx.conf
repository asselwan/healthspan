server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # The clinician dashboard is the root. /intake serves the patient intake.
  location = / {
    try_files /dashboard.html =404;
  }
  location = /dashboard {
    try_files /dashboard.html =404;
  }
  location = /dashboard/ {
    try_files /dashboard.html =404;
  }
  location = /intake {
    try_files /intake.html =404;
  }
  location = /intake/ {
    try_files /intake.html =404;
  }

  location / {
    try_files $uri $uri/ /dashboard.html;
  }

  # Static assets cache; html stays fresh so config changes land fast.
  location ~* \.(js|css)$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
  }
  location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-cache";
  }

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
